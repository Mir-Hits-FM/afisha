<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Радио-Афиша</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Orbitron', sans-serif; /* Футуристичный шрифт */
        }

        /* Стильные неоновые часы */
        #clock {
            margin-top: 30px;
            font-size: 3rem;
            color: #00ff00; /* Зеленый неон */
            text-shadow: 0 0 20px #00ff00, 0 0 40px #008000;
            font-weight: bold;
            letter-spacing: 5px;
            background: rgba(0,0,0,0.5);
            padding: 10px 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .poster-container {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            animation: float 4s ease-in-out infinite;
        }

        img { 
            max-width: 95%; max-height: 60vh; 
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Бегущая строка */
        .marquee-container {
            width: 100%; background: #000;
            border-top: 2px solid #00ff00;
            padding: 12px 0; position: absolute; bottom: 0;
        }

        .marquee-text {
            white-space: nowrap; display: inline-block;
            animation: marquee 25s linear infinite;
            color: #fff; font-size: 1.3rem; font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 600px) {
            #clock { font-size: 2rem; }
            .marquee-text { font-size: 0.9rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="clock">00:00:00</div>

    <div class="poster-container">
        <img src="https://vmfile.com/upload/838/1415274579.jpg" alt="Афиша">
    </div>

    <div class="marquee-container">
        <div class="marquee-text">
            СЛУШАЙТЕ ЛУЧШИЕ ХИТЫ НА НАШЕМ РАДИО! ⚡ ВРЕМЯ ЭФИРА БЛИЗКО! ⚡ ЗАКАЗЫВАЙТЕ ПЕСНИ ПРЯМО СЕЙЧАС! ⚡
        </div>
    </div>

    <script>
        // Функция для обновления часов
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Запускаем часы каждую секунду
        setInterval(updateClock, 1000);
        updateClock(); // Сразу показываем время
    </script>

</body>
</html>
